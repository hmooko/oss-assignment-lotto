{% extends "base.html" %}

{% block content %}
<section class="panel">
  <div class="section-heading">
    <p class="eyebrow">Ticket</p>
    <h1>{{ current_round.round_number }}회차 복권 구매</h1>
    <p class="muted">수동으로 직접 번호를 고르거나 자동으로 번호를 생성할 수 있습니다.</p>
  </div>
  <div class="split">
    <form class="choice-box" method="post">
      <h2>수동 번호</h2>
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">수동 구매</button>
    </form>
    <form class="choice-box accent" method="post" action="{% url 'lotto:buy_auto_ticket' %}">
      <h2>자동 번호</h2>
      {% csrf_token %}
      <p>1부터 45 사이의 번호 6개를 자동 생성합니다.</p>
      <button type="submit">자동 구매</button>
    </form>
  </div>
</section>
{% endblock %}
