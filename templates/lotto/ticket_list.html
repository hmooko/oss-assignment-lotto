{% extends "base.html" %}

{% block content %}
<section class="panel">
  <h1>내 복권</h1>
  <table>
    <thead>
      <tr>
        <th>회차</th>
        <th>번호</th>
        <th>구매 방식</th>
        <th>구매일</th>
      </tr>
    </thead>
    <tbody>
      {% for ticket in tickets %}
        <tr>
          <td>{{ ticket.round.round_number }}</td>
          <td>{{ ticket.numbers }}</td>
          <td>{{ ticket.get_purchase_type_display }}</td>
          <td>{{ ticket.purchased_at }}</td>
        </tr>
      {% empty %}
        <tr><td colspan="4">구매 내역이 없습니다.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
